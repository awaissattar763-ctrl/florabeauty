    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;-webkit-tap-highlight-color:transparent;}
    body{background:#0A0B0C;color:#CCC;font-family:"DM Sans",sans-serif;overflow:hidden;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}
    input,select,textarea{color:#CCC!important;caret-color:#D4A853;font-family:inherit;}
    input::placeholder,textarea::placeholder{color:#333!important;}
    select option{background:#181A1D;color:#CCC;}
    button{font-family:inherit;}
    button:active{transform:scale(.97);}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
    .penter{animation:fadeIn .22s ease both;}
    #loading{position:fixed;inset:0;background:#0A0B0C;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
    #loading .lm{font-size:52px;color:#D4A853;animation:pulse 1.8s infinite;}
    #loading .ln{font-family:"Playfair Display",serif;font-size:26px;color:#D4A853;letter-spacing:6px;}
    #loading .ls{font-size:10px;color:#444;letter-spacing:3px;text-transform:uppercase;}
    @media print{#sidebar,#topbar,#bottomnav{display:none!important;}body{background:#fff;color:#000;overflow:auto;}}
  </style>
</head>

function useMob(){
  const[m,setM]=useState(window.innerWidth<768);
  useEffect(()=>{const fn=()=>setM(window.innerWidth<768);window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);
  return m;
}
function useClock(){
  const[t,setT]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);
  return t;
}
function useLS(key,init){
  const[v,setV]=useState(()=>LS.get(key,typeof init==="function"?init():init));
  const set=useCallback(val=>{const n=typeof val==="function"?val(v):val;setV(n);LS.set(key,n);},[key,v]);
  return[v,set];
}

// ── AI ARIA ──
async function callARIA(history,ctx){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1200,
        system:`You are ARIA - AI assistant for Lumiere, a Michelin 3-star restaurant in Karachi, Pakistan.
LIVE DATA (${new Date().toLocaleTimeString()}):
TABLES: ${JSON.stringify(ctx.tables.map(t=>({id:t.id,status:t.status,guest:t.guest,section:t.section,orders:t.order?.length||0,bill:t.bill,notes:t.notes,loyalty:t.loyalty})))}
STAFF ON DUTY: ${JSON.stringify(ctx.staff.filter(s=>s.status==="on-duty").map(s=>({name:s.name,role:s.role,tables:s.tables})))}
KITCHEN: ${JSON.stringify(ctx.kitchen.map(k=>({table:k.tableId,status:k.status,eta:k.eta,priority:k.priority})))}
MENU (available): ${JSON.stringify(ctx.menu.filter(m=>m.available).map(m=>({name:m.name,price:m.price,cat:m.cat,prep:m.prep,stock:m.stock,allergens:m.allergens})))}
LOW INVENTORY: ${JSON.stringify(ctx.inv.filter(i=>i.qty<=i.min).map(i=>i.name))}
TONIGHT REVENUE: Rs 12,47,000 (+18% vs last Friday)
ACTIVE SPECIALS: ${JSON.stringify(ctx.specials.filter(s=>s.active).map(s=>s.name))}
ALERTS: ${ctx.notifs.filter(n=>!n.read).length} unread
Style: sophisticated, concise, actionable. Use Rs for prices. Bullet points for lists.`,
        messages:history,
      }),
    });
    const d=await r.json();
    return d.content?.map(b=>b.text||"").join("")||"ARIA unavailable.";
  }catch{return"Connection error. Please check your internet connection.";}
}

// ── SHARED UI COMPONENTS ──
const Badge=({children,color=G,dot=false})=>
  <span style={{background:color+"22",color,fontSize:10,padding:"2px 9px",borderRadius:20,fontWeight:500,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",gap:4}}>
    {dot&&<span style={{width:5,height:5,borderRadius:"50%",background:color,flexShrink:0}}/>}
    {children}
  </span>;

function Card({children,style={},onClick,hover=false}){
  const[h,setH]=useState(false);
  return <div onClick={onClick} onMouseEnter={()=>hover&&setH(true)} onMouseLeave={()=>setH(false)}
    style={{background:h?"#141618":"#111214",border:"1px solid #1E2024",borderRadius:14,padding:"16px 18px",cursor:onClick?"pointer":"default",transition:"background .2s",...style}}>{children}</div>;
}

const SLbl=({children,style={}})=>
  <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#444",marginBottom:10,...style}}>{children}</div>;

function KPI({label,value,sub,delta,color,onClick}){
  return(
    <Card style={{borderTop:`3px solid ${color}`}} onClick={onClick} hover={!!onClick}>
      <SLbl>{label}</SLbl>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color,lineHeight:1,marginBottom:5}}>{value}</div>
      <div style={{fontSize:11,color:"#555",display:"flex",gap:5,alignItems:"center"}}>
        {delta!=null&&<span style={{color:delta>=0?GR:RD,fontWeight:600}}>{delta>=0?"↑":"↓"}{Math.abs(delta)}%</span>}
        <span>{sub}</span>
      </div>
    </Card>
  );
}

function Modal({open,onClose,title,children,maxW=540}){
  useEffect(()=>{document.body.style.overflow=open?"hidden":"";},[open]);
  if(!open)return null;
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000000CC",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(2px)"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#111214",border:"1px solid #2A2C30",borderRadius:18,width:"100%",maxWidth:maxW,maxHeight:"92vh",overflowY:"auto",animation:"fadeIn .18s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px",borderBottom:"1px solid #1E2024",position:"sticky",top:0,background:"#111214",zIndex:1}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#E8E0D0"}}>{title}</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#555",fontSize:22,cursor:"pointer",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8}}>&#215;</button>
        </div>
        <div style={{padding:"18px 22px"}}>{children}</div>
      </div>
    </div>

}

function Inp({label,value,onChange,type="text",placeholder="",rows,required=false}){
  const s={width:"100%",background:"#181A1D",border:"1px solid #252830",borderRadius:9,padding:"9px 13px",color:"#CCC",fontSize:13,fontFamily:"inherit",outline:"none",transition:"border-color .2s"};
  const foc=e=>e.target.style.borderColor=G+"55";
  const blu=e=>e.target.style.borderColor="#252830";
  return(
    <div style={{marginBottom:13}}>
      {label&&<div style={{fontSize:11,color:"#666",marginBottom:5}}>{label}{required&&<span style={{color:RD,marginLeft:3}}>*</span>}</div>}
      {rows?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{...s,resize:"vertical"}} onFocus={foc} onBlur={blu}/>
            :<input value={value} onChange={e=>onChange(e.target.value)} type={type} placeholder={placeholder} style={s} onFocus={foc} onBlur={blu}/>}
    </div>
  );
}

function Sel({label,value,onChange,options,required=false}){
  return(
    <div style={{marginBottom:13}}>
      {label&&<div style={{fontSize:11,color:"#666",marginBottom:5}}>{label}{required&&<span style={{color:RD,marginLeft:3}}>*</span>}</div>}
      <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:"#181A1D",border:"1px solid #252830",borderRadius:9,padding:"9px 13px",color:"#CCC",fontSize:13,fontFamily:"inherit",outline:"none"}}>
        {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
    </div>
  );
}

function Btn({children,onClick,v="primary",s="md",disabled=false,full=false,style={}}){
  const BG={primary:G,danger:RD,success:GR,ghost:"#222427",info:BL,purple:PU}[v]||"#222427";
  const COL={ghost:"#888",success:"#fff",danger:"#fff"}[v]||"#0A0B0C";
  const PAD={sm:"5px 12px",md:"9px 18px",lg:"12px 26px"}[s];
  const FS={sm:11,md:13,lg:14}[s];
  return(
    <button onClick={onClick} disabled={disabled}
      style={{background:disabled?"#1A1C1F":BG,color:disabled?"#444":COL,border:"none",borderRadius:9,
              padding:PAD,fontSize:FS,cursor:disabled?"not-allowed":"pointer",fontWeight:500,
              transition:"opacity .15s",width:full?"100%":"auto",...style}}
      onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity=".82";}}
      onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
      {children}
    </button>
  );
}

function Toggle({label,value,onChange,color=G}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:12}} onClick={()=>onChange(!value)}>
      <div style={{width:38,height:21,borderRadius:11,background:value?color:"#222427",position:"relative",transition:"background .2s",flexShrink:0}}>

      <span style={{fontSize:13,color:"#777"}}>{label}</span>

}

function Divider({label}){

}

function Empty({emoji,title,sub}){

// ═══ FLOOR PLAN ═══
function FloorPlan({tables,setTables,menu}){
  const mob=useMob();
  const[sel,setSel]=useState(null);
  const[orderM,setOrderM]=useState(false);
  const[statusM,setStatusM]=useState(false);
  const[billM,setBillM]=useState(false);
  const[gi,setGi]=useState("");const[pi,setPi]=useState("");const[ni,setNi]=useState("");const[li,setLi]=useState("Bronze");
  const[filterSec,setFilterSec]=useState("All");
  const[menuSearch,setMenuSearch]=useState("");
  const selT=tables.find(t=>t.id===sel);
  const secs=["All",...new Set(tables.map(t=>t.section))];
  const ftables=filterSec==="All"?tables:tables.filter(t=>t.section===filterSec);
  const upd=(id,p)=>setTables(prev=>prev.map(t=>t.id===id?{...t,...p}:t));
  const addItem=id=>{const it=menu.find(m=>m.id===id);if(!it||!selT)return;upd(sel,{order:[...(selT.order||[]),id],bill:selT.bill+it.price});};
  const remItem=idx=>{const o=[...(selT.order||[])];const rem=menu.find(m=>m.id===o[idx]);o.splice(idx,1);upd(sel,{order:o,bill:Math.max(0,selT.bill-(rem?.price||0))});};
  const changeStatus=ns=>{
    const p={status:ns};
    if(ns==="available"){p.guest=null;p.order=[];p.bill=0;p.seated=null;p.notes="";p.phone="";p.loyalty="";}
    if(ns==="occupied"&&gi){p.guest=gi;p.phone=pi;p.notes=ni;p.loyalty=li;p.seated=timeNow();p.order=[];p.bill=0;}
    if(ns==="reserved"&&gi){p.guest=gi;p.phone=pi;p.notes=ni;p.loyalty=li;}
    upd(sel,p);setStatusM(false);setGi("");setPi("");setNi("");setLi("Bronze");
  };
  const gst=selT?Math.round(selT.bill*.17):0;
  const svc=selT?Math.round(selT.bill*.10):0;
  const grand=selT?selT.bill+gst+svc:0;
  const filteredMenu=menu.filter(m=>m.available&&(!menuSearch||m.name.toLowerCase().includes(menuSearch.toLowerCase())));

  return(
    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0"}}>Floor Plan</h1>
          <p style={{color:"#555",fontSize:12,marginTop:3}}>{tables.filter(t=>t.status==="occupied").length} occupied &middot; {tables.filter(t=>t.status==="available").length} available &middot; {tables.filter(t=>t.status==="reserved").length} reserved</p>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          {[[G,"occupied"],[GR,"available"],[BL,"reserved"]].map(([c,l])=>(
            <span key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#666"}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:c}}/>{l}
            </span>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        {secs.map(s=><button key={s} onClick={()=>setFilterSec(s)} style={{background:filterSec===s?G+"20":"#111214",border:filterSec===s?`1px solid ${G}`:"1px solid #1E2024",color:filterSec===s?G:"#555",padding:"5px 14px",borderRadius:20,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{s}</button>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(5,1fr)",gap:12,marginBottom:16}}>
        {ftables.map(t=>(
          <div key={t.id} onClick={()=>setSel(sel===t.id?null:t.id)}
            style={{background:sel===t.id?"#181A1D":"#111214",border:`1.5px solid ${SC[t.status]}`,borderRadius:13,padding:mob?12:16,cursor:"pointer",transition:"all .2s",boxShadow:sel===t.id?`0 0 0 2px ${SC[t.status]}44`:"none",position:"relative",animation:"fadeIn .2s ease"}}>
            <div style={{position:"absolute",top:8,right:8,width:8,height:8,borderRadius:"50%",background:SECC[t.section]||"#888"}}/>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,paddingRight:14}}>
              <span style={{color:SC[t.status],fontSize:13,fontWeight:700}}>T{t.id}</span>
              <span style={{fontSize:9,color:"#444"}}>{t.section}</span>
            </div>
            <div style={{fontSize:10,color:"#444",marginBottom:5}}>{t.seats} seats</div>
            {t.guest&&<div style={{fontSize:11,color:"#CCC",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.guest}</div>}
            {t.loyalty&&<div style={{marginBottom:3}}><Badge color={LC[t.loyalty]||G}>{t.loyalty}</Badge></div>}
            {t.seated&&<div style={{fontSize:10,color:"#555"}}>{t.seated}</div>}
            {t.bill>0&&<div style={{fontSize:11,color:G,marginTop:4,fontFamily:"'Playfair Display',serif"}}>{fmt(t.bill)}</div>}
            <div style={{marginTop:7}}><Badge color={SC[t.status]} dot>{t.status}</Badge></div>
          </div>

      </div>

              {selT.bill>0&&<div style={{fontSize:16,color:G,marginTop:6,fontFamily:"'Playfair Display',serif"}}>Bill: {fmt(selT.bill)}</div>}
            </div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              <Btn s="sm" v="ghost" onClick={()=>setStatusM(true)}>Change Status</Btn>
              {selT.status==="occupied"&&<Btn s="sm" onClick={()=>setOrderM(true)}>Manage Order</Btn>}

            </div>
          </div>
          {selT.order?.length>0&&(

              <Divider label={`Order - ${selT.order.length} items`}/>

        <Sel label="Loyalty Tier" value={li} onChange={setLi} options={["Platinum","Gold","Silver","Bronze"].map(l=>({v:l,l}))}/>

        {selT&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <SLbl style={{marginBottom:0}}>Current ({selT.order?.length||0} items)</SLbl>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:G}}>{fmt(selT.bill)}</span>
          </div>
          {(selT.order||[]).length===0&&<div style={{color:"#444",fontSize:13,marginBottom:12,padding:"8px 0"}}>No items yet</div>}
          {(selT.order||[]).map((oid,i)=>{const it=menu.find(m=>m.id===oid);return it?(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1A1C1F"}}>
              <span style={{fontSize:18}}>{it.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:"#DDD"}}>{it.name}</div>
                <div style={{fontSize:11,color:"#555"}}>{fmt(it.price)} &middot; {it.prep}m {it.allergens?.length>0&&`· ⚠ ${it.allergens.join(", ")}`}</div>
              </div>

// ═══ KITCHEN DISPLAY ═══

    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>

      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:14}}>
        {["pending","cooking","ready"].map(st=>(
          <div key={st}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 12px",background:KC[st]+"10",border:`1px solid ${KC[st]}30`,borderRadius:9}}>

              <span style={{fontSize:12,color:KC[st],textTransform:"capitalize",fontWeight:600,letterSpacing:.5}}>{st}</span>
              <span style={{fontSize:11,color:KC[st]+"88",marginLeft:"auto"}}>{kitchen.filter(k=>k.status===st).length} order{kitchen.filter(k=>k.status===st).length!==1?"s":""}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {kitchen.filter(k=>k.status===st).map(k=>(
                <Card key={k.id} style={{borderLeft:`3px solid ${KC[k.status]}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:KC[k.status]}}>Table {k.tableId}</span>
                      {k.priority==="high"&&<Badge color={RD}>PRIORITY</Badge>}

                    <span style={{fontSize:10,color:"#444"}}>{k.placedAt}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                    {k.items.map((item,i)=>(
                      <div key={i} style={{fontSize:12,color:"#CCC",display:"flex",alignItems:"center",gap:6}}>
                        <span style={{width:4,height:4,borderRadius:"50%",background:KC[k.status],flexShrink:0}}/>
                        {item}
                      </div>
                    ))}
                  </div>
                  {k.status==="cooking"&&<div style={{fontSize:12,color:G,marginBottom:8}}>ETA: {k.eta} minutes</div>}
                  <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                    {k.status==="pending"&&<Btn s="sm" onClick={()=>updK(k.id,{status:"cooking"})}>Start Cooking</Btn>}
                    {k.status==="cooking"&&<Btn s="sm" v="success" onClick={()=>updK(k.id,{status:"ready",eta:0})}>Mark Ready</Btn>}
                    {k.status==="ready"&&<Btn s="sm" v="ghost" onClick={()=>setKitchen(p=>p.filter(o=>o.id!==k.id))}>Served &#10003;</Btn>}
                    {k.priority!=="high"&&<Btn s="sm" v="danger" onClick={()=>updK(k.id,{priority:"high"})}>! Priority</Btn>}
                  </div>
                </Card>
              ))}
              {kitchen.filter(k=>k.status===st).length===0&&(
                <div style={{background:"#111214",border:"1px solid #1E2024",borderRadius:12,padding:"20px",textAlign:"center",color:"#333",fontSize:12}}>No {st} orders</div>

          </div>
        ))}
      </div>
    </div>
  );
}

// ═══ RESERVATIONS ═══
function Reservations({reservations,setReservations,tables}){
  const mob=useMob();
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[addM,setAddM]=useState(false);
  const[viewM,setViewM]=useState(null);
  const[nr,setNr]=useState({name:"",date:todayStr(),time:"19:00",party:"2",table:"2",phone:"",notes:"",loyalty:"Bronze"});
  const sC={confirmed:BL,seated:GR,cancelled:RD,"no-show":"#666"};
  const filtered=reservations.filter(r=>(filter==="all"||r.status===filter)&&(!search||r.name.toLowerCase().includes(search.toLowerCase())||r.phone.includes(search)));
  const add=()=>{
    const id=Math.max(...reservations.map(r=>r.id))+1;
    setReservations(p=>[...p,{...nr,id,party:+nr.party,table:+nr.table,status:"confirmed",visits:1,spend:0}]);
    setAddM(false);setNr({name:"",date:todayStr(),time:"19:00",party:"2",table:"2",phone:"",notes:"",loyalty:"Bronze"});
  };
  const updS=(id,s)=>setReservations(p=>p.map(r=>r.id===id?{...r,status:s}:r));

  return(
    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0"}}>Reservations</h1>
          <p style={{color:"#555",fontSize:12,marginTop:3}}>{reservations.filter(r=>r.status==="confirmed").length} confirmed &middot; {reservations.filter(r=>r.status==="seated").length} seated</p>
        </div>
        <Btn onClick={()=>setAddM(true)}>+ New Reservation</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:12,marginBottom:18}}>
        <KPI label="Tonight Total" value={reservations.filter(r=>r.date===todayStr()).length} sub="reservations" color={G}/>
        <KPI label="Covers Tonight" value={reservations.filter(r=>r.date===todayStr()).reduce((a,r)=>a+r.party,0)} sub="guests expected" color={GR}/>
        <KPI label="VIP Guests" value={reservations.filter(r=>["Platinum","Gold"].includes(r.loyalty)).length} sub="Platinum + Gold" color={G}/>
        <KPI label="Avg Lifetime" value="Rs 42K" sub="per loyal guest" color={BL}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name or phone..."
          style={{flex:1,minWidth:160,background:"#111214",border:"1px solid #1E2024",borderRadius:9,padding:"8px 13px",color:"#CCC",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["all","confirmed","seated","cancelled","no-show"].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{background:filter===s?G+"20":"#111214",border:filter===s?`1px solid ${G}`:"1px solid #1E2024",color:filter===s?G:"#555",padding:"6px 13px",borderRadius:20,cursor:"pointer",fontSize:11,fontFamily:"inherit",textTransform:"capitalize"}}>{s}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {filtered.length===0&&<Empty emoji="&#128197;" title="No reservations found" sub="Try adjusting your filters"/>}
        {filtered.map(r=>(
          <Card key={r.id} hover onClick={()=>setViewM(r)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}>
                  <span style={{fontSize:14,color:"#DDD",fontWeight:500}}>{r.name}</span>
                  <Badge color={sC[r.status]||"#888"} dot>{r.status}</Badge>
                  {r.loyalty&&<Badge color={LC[r.loyalty]}>{r.loyalty}</Badge>}
                  {["Platinum","Gold"].includes(r.loyalty)&&<span>&#11088;</span>}
                </div>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#555"}}>&#128197; {r.date}</span>
                  <span style={{fontSize:12,color:"#555"}}>&#128336; {r.time}</span>
                  <span style={{fontSize:12,color:"#555"}}>&#128101; {r.party} guests</span>
                  <span style={{fontSize:12,color:"#555"}}>&#11043; Table {r.table}</span>
                  {r.visits>1&&<span style={{fontSize:12,color:"#555"}}>&#128260; {r.visits} visits</span>}
                </div>
                {r.phone&&<div style={{fontSize:11,color:"#444",marginTop:3}}>&#128222; {r.phone}</div>}
                {r.notes&&<div style={{fontSize:11,color:G+"88",marginTop:3,fontStyle:"italic"}}>&#128221; {r.notes}</div>}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {r.status==="confirmed"&&<Btn s="sm" v="success" onClick={e=>{e.stopPropagation();updS(r.id,"seated");}}>Seat</Btn>}
                {r.status==="confirmed"&&<Btn s="sm" v="danger" onClick={e=>{e.stopPropagation();updS(r.id,"no-show");}}>No Show</Btn>}
                {!["cancelled","seated"].includes(r.status)&&<Btn s="sm" v="ghost" onClick={e=>{e.stopPropagation();updS(r.id,"cancelled");}}>Cancel</Btn>}

              <div key={l} style={{background:"#181A1D",borderRadius:9,padding:"10px",textAlign:"center"}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:c}}>{v}</div>
                <div style={{fontSize:10,color:"#555",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {[["Date",viewM.date],["Time",viewM.time],["Party",`${viewM.party} guests`],["Table",`Table ${viewM.table}`],["Phone",viewM.phone||"—"],["Status",viewM.status]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,color:"#555",marginBottom:3}}>{l}</div><div style={{fontSize:13,color:"#DDD",textTransform:"capitalize"}}>{v}</div></div>
            ))}
          </div>
          {viewM.notes&&<div style={{background:"#181A1D",borderRadius:9,padding:"10px 12px",marginBottom:14,fontSize:13,color:"#CCC",fontStyle:"italic"}}>&#128221; {viewM.notes}</div>}
          <div style={{display:"flex",gap:8}}>
            {viewM.status==="confirmed"&&<Btn v="success" onClick={()=>{updS(viewM.id,"seated");setViewM(null);}}>Seat Guest</Btn>}
            <Btn v="danger" onClick={()=>{del(viewM.id);setViewM(null);}}>Delete</Btn>
            <Btn v="ghost" onClick={()=>setViewM(null)}>Close</Btn>
          </div>
        </>}
      </Modal>
      <Modal open={addM} onClose={()=>setAddM(false)} title="New Reservation">
        <Inp label="Guest Name" value={nr.name} onChange={v=>setNr(p=>({...p,name:v}))} placeholder="Mr. / Ms. ..." required/>
        <Inp label="Phone" value={nr.phone} onChange={v=>setNr(p=>({...p,phone:v}))} placeholder="+92-..."/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Date" value={nr.date} onChange={v=>setNr(p=>({...p,date:v}))} type="date"/>
          <Inp label="Time" value={nr.time} onChange={v=>setNr(p=>({...p,time:v}))} type="time"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Party Size" value={nr.party} onChange={v=>setNr(p=>({...p,party:v}))} type="number"/>
          <Sel label="Loyalty Tier" value={nr.loyalty} onChange={v=>setNr(p=>({...p,loyalty:v}))} options={["Platinum","Gold","Silver","Bronze"].map(l=>({v:l,l}))}/>
        </div>
        <Sel label="Table" value={nr.table} onChange={v=>setNr(p=>({...p,table:v}))} options={tables.filter(t=>t.status!=="occupied").map(t=>({v:String(t.id),l:`Table ${t.id} - ${t.section} (${t.seats} seats)`}))}/>
        <Inp label="Notes" value={nr.notes} onChange={v=>setNr(p=>({...p,notes:v}))} placeholder="VIP protocol, allergies..." rows={2}/>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={add} disabled={!nr.name}>Confirm</Btn>
          <Btn v="ghost" onClick={()=>setAddM(false)}>Cancel</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ═══ MENU MANAGEMENT ═══
function MenuMgmt({menu,setMenu}){
  const mob=useMob();
  const[cat,setCat]=useState("All");
  const[search,setSearch]=useState("");
  const[editItem,setEditItem]=useState(null);
  const[addM,setAddM]=useState(false);
  const[ni,setNi]=useState({name:"",price:"",cat:"Mains",emoji:"🍽️",desc:"",prep:"",allergens:"",stock:"10",cost:""});
  const cats=["All",...new Set(menu.map(m=>m.cat))];
  const filtered=useMemo(()=>menu.filter(m=>(cat==="All"||m.cat===cat)&&(!search||m.name.toLowerCase().includes(search.toLowerCase()))),[menu,cat,search]);
  const weekProfit=useMemo(()=>menu.reduce((a,m)=>a+(m.price-m.cost)*m.orders,0),[menu]);
  const toggle=id=>setMenu(p=>p.map(m=>m.id===id?{...m,available:!m.available}:m));
  const saveEdit=()=>{setMenu(p=>p.map(m=>m.id===editItem.id?editItem:m));setEditItem(null);};
  const del=id=>setMenu(p=>p.filter(m=>m.id!==id));
  const addIt=()=>{
    const id=Math.max(...menu.map(m=>m.id))+1;
    setMenu(p=>[...p,{...ni,id,price:+ni.price,prep:+ni.prep,stock:+ni.stock,cost:+ni.cost||0,orders:0,popular:false,available:true,allergens:ni.allergens.split(",").map(a=>a.trim()).filter(Boolean)}]);
    setAddM(false);setNi({name:"",price:"",cat:"Mains",emoji:"🍽️",desc:"",prep:"",allergens:"",stock:"10",cost:""});
  };
  return(
    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0"}}>Menu Management</h1>
          <p style={{color:"#555",fontSize:12,marginTop:3}}>{menu.length} items &middot; {menu.filter(m=>m.available).length} available &middot; {menu.filter(m=>m.stock<=3).length} low stock</p>
        </div>
        <Btn onClick={()=>setAddM(true)}>+ Add Item</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:12,marginBottom:18}}>
        <KPI label="Total Items" value={menu.length} sub="on menu" color={G}/>
        <KPI label="Available" value={menu.filter(m=>m.available).length} sub="tonight" color={GR}/>
        <KPI label="Low Stock" value={menu.filter(m=>m.stock<=3).length} sub="need attention" color={RD}/>
        <KPI label="Week Profit" value={`Rs ${(weekProfit/1000).toFixed(0)}K`} sub="estimated" color={BL}/>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
          style={{flex:1,minWidth:140,background:"#111214",border:"1px solid #1E2024",borderRadius:9,padding:"8px 13px",color:"#CCC",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?G+"20":"#111214",border:cat===c?`1px solid ${G}`:"1px solid #1E2024",color:cat===c?G:"#555",padding:"6px 13px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{c}</button>)}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(2,1fr)",gap:12}}>
        {filtered.map(item=>(
          <Card key={item.id} style={{opacity:item.available?1:.55}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:24,flexShrink:0,lineHeight:1}}>{item.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:4}}>
                  <span style={{fontSize:13,color:"#DDD",fontWeight:500}}>{item.name}</span>
                  {item.popular&&<Badge color={G}>&#9733;</Badge>}
                  {!item.available&&<Badge color={RD}>86'd</Badge>}
                  {item.stock<=3&&item.available&&<Badge color={RD}>Low:{item.stock}</Badge>}
                </div>
                <div style={{fontSize:11,color:"#444",fontStyle:"italic",marginBottom:6}}>{item.desc}</div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:item.allergens?.length>0?4:0}}>
                  <Badge color={BL}>{item.cat}</Badge>
                  <span style={{fontSize:11,color:"#444"}}>&#8987; {item.prep}m</span>
                  <span style={{fontSize:11,color:"#444"}}>&#128230; {item.stock}</span>
                  <span style={{fontSize:11,color:"#444"}}>&#128722; {item.orders||0}</span>
                </div>

// ═══ INVENTORY ═══
function Inventory({inv,setInv}){
  const mob=useMob();
  const[editId,setEditId]=useState(null);
  const[editQty,setEditQty]=useState("");
  const[cat,setCat]=useState("All");
  const[addM,setAddM]=useState(false);
  const[ni,setNi]=useState({name:"",unit:"kg",qty:"",min:"",cat:"Pantry",cost:"",supplier:""});
  const cats=["All",...new Set(inv.map(i=>i.cat))];
  const filtered=cat==="All"?inv:inv.filter(i=>i.cat===cat);
  const critical=inv.filter(i=>i.qty<=i.min);
  const save=()=>{setInv(p=>p.map(i=>i.id===editId?{...i,qty:+editQty}:i));setEditId(null);};
  const add=()=>{
    const id=Math.max(...inv.map(i=>i.id))+1;
    setInv(p=>[...p,{...ni,id,qty:+ni.qty,min:+ni.min,cost:+ni.cost||0}]);
    setAddM(false);setNi({name:"",unit:"kg",qty:"",min:"",cat:"Pantry",cost:"",supplier:""});
  };
  const del=id=>setInv(p=>p.filter(i=>i.id!==id));
  return(
    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0"}}>Inventory</h1>
          <p style={{color:"#555",fontSize:12,marginTop:3}}>{inv.length} items &middot; {critical.length} critical</p>
        </div>
        <Btn onClick={()=>setAddM(true)}>+ Add Item</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:12,marginBottom:18}}>
        <KPI label="Total Items" value={inv.length} sub="tracked" color={BL}/>
        <KPI label="Critical" value={critical.length} sub="reorder needed" color={RD}/>
        <KPI label="Healthy" value={inv.filter(i=>i.qty>i.min*2).length} sub="well-stocked" color={GR}/>
        <KPI label="Stock Value" value={`Rs ${(inv.reduce((a,i)=>a+i.qty*i.cost,0)/1000).toFixed(0)}K`} sub="estimated" color={G}/>
      </div>
      {critical.length>0&&(
        <Card style={{marginBottom:16,borderLeft:`3px solid ${RD}`,background:"#0D0E10"}}>
          <SLbl>&#9888; Critical - Reorder Required</SLbl>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {critical.map(i=>(
              <div key={i.id} style={{background:RD+"15",border:`1px solid ${RD}33`,borderRadius:9,padding:"6px 12px"}}>
                <div style={{fontSize:12,color:"#DDD"}}>{i.name}</div>
                <div style={{fontSize:10,color:RD}}>{i.qty} {i.unit} (min:{i.min})</div>
                <div style={{fontSize:10,color:"#444"}}>{i.supplier}</div>
              </div>
            ))}
          </div>
        </Card>
      )}
      <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?G+"20":"#111214",border:cat===c?`1px solid ${G}`:"1px solid #1E2024",color:cat===c?G:"#555",padding:"5px 13px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{c}</button>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(item=>{
          const pct=Math.min((item.qty/(item.min*3))*100,100);
          const color=item.qty<=item.min?RD:item.qty<=item.min*1.5?G:GR;
          return(
            <Card key={item.id}>
              <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:180}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,color:"#DDD",fontWeight:500}}>{item.name}</span>
                    <Badge color={color} dot>{item.qty<=item.min?"Critical":item.qty<=item.min*1.5?"Low":"OK"}</Badge>
                    <Badge color={BL}>{item.cat}</Badge>
                  </div>
                  <div style={{height:5,background:"#1E2024",borderRadius:3,marginBottom:5}}>
                    <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3,transition:"width .6s"}}/>
                  </div>
                  <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"#555"}}>Current: <span style={{color}}>{item.qty} {item.unit}</span></span>
                    <span style={{fontSize:11,color:"#555"}}>Min: {item.min} {item.unit}</span>
                    {item.cost>0&&<span style={{fontSize:11,color:"#555"}}>Rs {item.cost}/{item.unit}</span>}
                    <span style={{fontSize:11,color:"#444"}}>{item.supplier}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}>
                  {editId===item.id?(
                    <>
                      <input value={editQty} onChange={e=>setEditQty(e.target.value)} type="number"
                        style={{width:70,background:"#181A1D",border:`1px solid ${G}55`,borderRadius:8,padding:"7px 10px",color:"#CCC",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
                      <Btn s="sm" v="success" onClick={save}>Save</Btn>
                      <Btn s="sm" v="ghost" onClick={()=>setEditId(null)}>&#215;</Btn>
                    </>
                  ):(
                    <>
                      <Btn s="sm" v="ghost" onClick={()=>{setEditId(item.id);setEditQty(String(item.qty));}}>Update</Btn>
                      <Btn s="sm" v="danger" onClick={()=>del(item.id)}>&#215;</Btn>
                    </>
                  )}
                </div>
              </div>
            </Card>
          );
        })}
      </div>
      <Modal open={addM} onClose={()=>setAddM(false)} title="Add Inventory Item">
        <Inp label="Item Name" value={ni.name} onChange={v=>setNi(p=>({...p,name:v}))} placeholder="e.g. Saffron" required/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Current Qty" value={ni.qty} onChange={v=>setNi(p=>({...p,qty:v}))} type="number" placeholder="10"/>
          <Inp label="Minimum Level" value={ni.min} onChange={v=>setNi(p=>({...p,min:v}))} type="number" placeholder="3"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Unit" value={ni.unit} onChange={v=>setNi(p=>({...p,unit:v}))} placeholder="kg, g, bottles"/>
          <Sel label="Category" value={ni.cat} onChange={v=>setNi(p=>({...p,cat:v}))} options={["Proteins","Luxury","Wines","Dairy","Pantry","Produce"].map(c=>({v:c,l:c}))}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Cost/unit (Rs)" value={ni.cost} onChange={v=>setNi(p=>({...p,cost:v}))} type="number"/>
          <Inp label="Supplier" value={ni.supplier} onChange={v=>setNi(p=>({...p,supplier:v}))} placeholder="Supplier name"/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={add} disabled={!ni.name||!ni.qty||!ni.min}>Add Item</Btn>
          <Btn v="ghost" onClick={()=>setAddM(false)}>Cancel</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ═══ GUEST CRM ═══
function GuestCRM({reservations}){
  const mob=useMob();
  const[search,setSearch]=useState("");
  const[tier,setTier]=useState("All");
  const guests=useMemo(()=>{
    const map={};
    reservations.forEach(r=>{
      if(!map[r.name])map[r.name]={name:r.name,phone:r.phone,loyalty:r.loyalty,visits:r.visits||1,spend:r.spend||0,notes:r.notes,lastVisit:r.date};
      else{map[r.name].visits+=(r.visits||1);map[r.name].spend+=(r.spend||0);}
    });
    return Object.values(map).filter(g=>(!search||g.name.toLowerCase().includes(search.toLowerCase()))&&(tier==="All"||g.loyalty===tier)).sort((a,b)=>b.spend-a.spend);
  },[reservations,search,tier]);
  return(
    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0",marginBottom:4}}>Guest CRM</h1>
      <p style={{color:"#555",fontSize:12,marginBottom:18}}>{guests.length} guest profiles &middot; sorted by lifetime spend</p>
      <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:12,marginBottom:18}}>
        {[["Platinum",reservations.filter(r=>r.loyalty==="Platinum").length,"#E8E0D0"],["Gold",reservations.filter(r=>r.loyalty==="Gold").length,G],["Silver",reservations.filter(r=>r.loyalty==="Silver").length,"#AAB4C0"],["Bronze",reservations.filter(r=>r.loyalty==="Bronze").length,"#CD7F32"]].map(([l,v,c])=>(
          <KPI key={l} label={l} value={v} sub="guests" color={c}/>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search guests..."
          style={{flex:1,minWidth:160,background:"#111214",border:"1px solid #1E2024",borderRadius:9,padding:"8px 13px",color:"#CCC",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["All","Platinum","Gold","Silver","Bronze"].map(t=>(
            <button key={t} onClick={()=>setTier(t)} style={{background:tier===t?LC[t]+"22":"#111214",border:tier===t?`1px solid ${LC[t]||G}`:"1px solid #1E2024",color:tier===t?LC[t]||G:"#555",padding:"5px 13px",borderRadius:20,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{t}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {guests.length===0&&<Empty emoji="&#128100;" title="No guests found"/>}
        {guests.map((g,i)=>(
          <Card key={i}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}>
                  <span style={{fontSize:15,color:"#DDD",fontWeight:500}}>{g.name}</span>
                  {g.loyalty&&<Badge color={LC[g.loyalty]}>{g.loyalty}</Badge>}
                  {["Platinum","Gold"].includes(g.loyalty)&&<span>&#11088;</span>}
                </div>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  {g.phone&&<span style={{fontSize:12,color:"#555"}}>&#128222; {g.phone}</span>}

                  {g.spend>0&&<span style={{fontSize:12,color:GR}}>&#128176; {fmt(g.spend)} lifetime</span>}

// ═══ NOTIFICATIONS ═══
function NotifPage({notifs,setNotifs,setPage}){
  const mob=useMob();
  const[filter,setFilter]=useState("all");
  const markAll=()=>setNotifs(p=>p.map(n=>({...n,read:true})));
  const markOne=id=>setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
  const dismiss=id=>setNotifs(p=>p.filter(n=>n.id!==id));
  const unread=notifs.filter(n=>!n.read).length;
  const filtered=filter==="all"?notifs:filter==="unread"?notifs.filter(n=>!n.read):notifs.filter(n=>n.type===filter);
  return(
    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0"}}>Notifications</h1>
          <p style={{color:"#555",fontSize:12,marginTop:3}}>{unread} unread &middot; {notifs.length} total</p>
        </div>
        {unread>0&&<Btn v="ghost" s="sm" onClick={markAll}>Mark all read</Btn>}
      </div>
      <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap"}}>
        {["all","unread","alert","warning","info","success"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?G+"20":"#111214",border:filter===f?`1px solid ${G}`:"1px solid #1E2024",color:filter===f?G:"#555",padding:"5px 13px",borderRadius:20,cursor:"pointer",fontSize:11,fontFamily:"inherit",textTransform:"capitalize"}}>{f}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.length===0&&<Empty emoji="&#128276;" title="All caught up!" sub="No notifications to show"/>}
        {filtered.map(n=>(
          <div key={n.id} onClick={()=>n.action&&setPage(n.action)}
            style={{background:n.read?"#0D0E10":"#111214",border:`1px solid ${n.read?"#181A1D":SC[n.type]+"44"}`,borderLeft:`3px solid ${SC[n.type]}`,borderRadius:12,padding:"12px 15px",display:"flex",gap:11,alignItems:"flex-start",animation:"fadeIn .2s ease",cursor:n.action?"pointer":"default"}}>
            <span style={{fontSize:16,flexShrink:0}}>{n.type==="alert"?"🔴":n.type==="warning"?"🟡":n.type==="success"?"🟢":"🔵"}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:n.read?"#555":"#CCC",lineHeight:1.5}}>{n.msg}</div>
              <div style={{display:"flex",gap:8,marginTop:5,alignItems:"center"}}>
                <span style={{fontSize:10,color:"#444"}}>{n.time}</span>
                {n.action&&<span style={{fontSize:10,color:BL}}>View &#8594;</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              {!n.read&&<Btn s="sm" v="ghost" onClick={e=>{e.stopPropagation();markOne(n.id);}}>&#10003;</Btn>}
              <Btn s="sm" v="danger" onClick={e=>{e.stopPropagation();dismiss(n.id);}}>&#215;</Btn>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ARIAPage({tables,staff,menu,inv,specials,notifs,kitchen}){
  const mob=useMob();
  const[msgs,setMsgs]=useLS("aria_msgs",[{role:"assistant",content:"Bonsoir. I am ARIA - your intelligent restaurant assistant for Lumiere, Karachi.\n\nI have live access to your floor plan, kitchen display, staff roster, inventory, menu, and revenue data.\n\nTonight's highlights:\n• 3 tables occupied, 2 reserved - CEO Al-Rashid arriving in 12 min\n• Kitchen: 1 order ready at Table 9\n• 3 inventory alerts: Chateau Margaux, Opus One, Foie Gras\n\nHow may I assist tonight?"}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const ref=useRef(null);
  const SUGG=["Which tables need attention?","VIP briefing for CEO Al-Rashid","Wagyu wine pairing","Tonight revenue vs last Friday","Kitchen queue help","Allergen check - occupied tables","Staff performance","Upsell opportunities","Revenue forecast","Inventory reorder now?"];
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
  const send=async t=>{
    const q=(t||input).trim();if(!q||loading)return;
    setInput("");
    const h=[...msgs,{role:"user",content:q}];setMsgs(h);setLoading(true);
    const reply=await callARIA(h.map(m=>({role:m.role,content:m.content})),{tables,staff,menu,inv,specials,notifs,kitchen});
    setMsgs([...h,{role:"assistant",content:reply}]);setLoading(false);
  };
  const clearChat=()=>setMsgs([{role:"assistant",content:"Chat cleared. How may I assist?"}]);
  return(
    <div style={{padding:mob?"16px 12px 0":"28px 36px 0",height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexShrink:0,flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0"}}>&#10022; ARIA</h1>

        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <Btn s="sm" v="ghost" onClick={clearChat}>Clear Chat</Btn>
          <div style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:GR}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:GR,boxShadow:`0 0 8px ${GR}66`,animation:"pulse 2s infinite"}}/>AI Online
          </div>
        </div>
      </div>
      <div style={{flex:1,background:"#0C0D0F",border:"1px solid #1E2024",borderRadius:16,display:"flex",flexDirection:"column",overflow:"hidden",marginBottom:mob?12:20}}>
        <div style={{flex:1,overflowY:"auto",padding:mob?12:20,display:"flex",flexDirection:"column",gap:14}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",gap:10,flexDirection:m.role==="user"?"row-reverse":"row",alignItems:"flex-start",animation:"fadeIn .2s ease"}}>
              {m.role==="assistant"&&<div style={{width:32,height:32,borderRadius:10,background:G+"18",color:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0,border:`1px solid ${G}22`}}>&#10022;</div>}
              <div style={{background:m.role==="user"?G+"12":"#141618",border:m.role==="user"?`1px solid ${G}28`:"1px solid #1E2024",borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",padding:mob?"10px 13px":"12px 16px",maxWidth:"80%",fontSize:13,lineHeight:1.8,color:m.role==="user"?"#DDD":"#CCC",whiteSpace:"pre-wrap"}}>{m.content}</div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{width:32,height:32,borderRadius:10,background:G+"18",color:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,border:`1px solid ${G}22`}}>&#10022;</div>
              <div style={{background:"#141618",border:"1px solid #1E2024",borderRadius:"4px 16px 16px 16px",padding:"14px 18px",display:"flex",gap:5,alignItems:"center"}}>
                {[0,1,2].map(i=><span key={i} style={{width:7,height:7,borderRadius:"50%",background:G,display:"inline-block",animation:`bounce .9s ${i*.15}s infinite`}}/>)}
              </div>
            </div>
          )}
          <div ref={ref}/>
        </div>
        {!mob&&(
          <div style={{borderTop:"1px solid #181A1D",padding:"10px 16px",display:"flex",gap:7,flexWrap:"wrap",background:"#0D0E10"}}>
            {SUGG.map(s=>(
              <button key={s} onClick={()=>send(s)} disabled={loading}
                style={{background:"none",border:"1px solid #1E2024",color:"#444",padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontFamily:"inherit",transition:"all .2s",whiteSpace:"nowrap"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=G+"55";e.currentTarget.style.color=G;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="#1E2024";e.currentTarget.style.color="#444";}}>{s}</button>
            ))}
          </div>
        )}
        <div style={{borderTop:"1px solid #181A1D",padding:mob?"10px 13px":"14px 16px",display:"flex",gap:9,background:"#0D0E10"}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()}
            placeholder={mob?"Ask ARIA...":"Ask ARIA anything about tonight's service..."} disabled={loading}
            style={{flex:1,background:"#181A1D",border:"1px solid #252830",borderRadius:11,padding:"11px 15px",color:"#CCC",fontSize:13,fontFamily:"inherit",outline:"none",transition:"border-color .2s"}}

          <button onClick={()=>send()} disabled={loading||!input.trim()}
            style={{background:input.trim()&&!loading?G:"#181A1D",border:"none",color:input.trim()&&!loading?"#0A0B0C":"#333",width:44,height:44,borderRadius:11,cursor:"pointer",fontSize:18,flexShrink:0,transition:"all .2s"}}>&#10148;</button>
        </div>
      </div>
    </div>
  );
}

function Settings({tables,menu,staff,reservations,notifs,specials,inv,setTables,setMenu,setStaff,setReservations,setNotifs,setSpecials,setInv}){
  const mob=useMob();
  const[confirm,setConfirm]=useState(false);
  const resetAll=()=>{
    setTables(D_TABLES);setMenu(D_MENU);setStaff(D_STAFF);setReservations(D_RES);setNotifs(D_NOTIFS);setSpecials(D_SPECIALS);setInv(D_INV);
    ["tables","menu","staff","res","notifs","specials","inv","aria_msgs"].forEach(k=>localStorage.removeItem("lrms_"+k));
    setConfirm(false);
  };
  const exportData=()=>{
    const data={tables,menu,staff,reservations,notifs,specials,inv,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`lumiere-backup-${todayStr()}.json`;a.click();URL.revokeObjectURL(url);
  };
  return(
    <div style={{padding:mob?"16px 12px":"28px 36px",height:"100%",overflowY:"auto"}}>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?20:28,fontWeight:400,color:"#E8E0D0",marginBottom:4}}>Settings</h1>
      <p style={{color:"#555",fontSize:12,marginBottom:22}}>System configuration &middot; Data management</p>
      <Card style={{marginBottom:14}}>
        <SLbl>System Information</SLbl>
        <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(3,1fr)",gap:12}}>
          {[["Version","v4.0 Pro",G],["Tables",tables.length,BL],["Menu Items",menu.length,GR],["Staff",staff.length,G],["Reservations",reservations.length,BL],["Inventory",inv.length,GR]].map(([l,v,c])=>(
            <div key={l} style={{background:"#181A1D",borderRadius:9,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:c}}>{v}</div>
              <div style={{fontSize:10,color:"#555",marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card style={{marginBottom:14}}>
        <SLbl>Data Storage</SLbl>
        <p style={{fontSize:13,color:"#666",marginBottom:12,lineHeight:1.6}}>All data is saved in your browser's localStorage. Data persists between sessions. Export backups regularly for safety.</p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Btn onClick={exportData}>&#8681; Export Backup (JSON)</Btn>
          <Btn v="danger" onClick={()=>setConfirm(true)}>&#8634; Reset All Data</Btn>
        </div>
      </Card>
      <Card>
        <SLbl>About</SLbl>
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:14}}>
          <div style={{width:46,height:46,borderRadius:12,background:G+"20",display:"flex",alignItems:"center",justifyContent:"center",color:G,fontSize:20}}>&#10022;</div>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:G,letterSpacing:2}}>LUMIERE RMS</div>
            <div style={{fontSize:11,color:"#555"}}>Restaurant Management Suite v4.0 Professional</div>
          </div>
        </div>
        {[["AI Engine","Claude claude-sonnet-4-20250514 (Anthropic)"],["Framework","React 18 - CDN (no build required)"],["Storage","Browser localStorage - offline capable"],["Data Persistence","Saved automatically on every change"],["License","MIT - Free to use and modify"]].map(([l,v])=>(
          <div key={l} style={{display:"flex",gap:8,fontSize:12,marginBottom:6}}>
            <span style={{color:"#444",minWidth:110,flexShrink:0}}>{l}</span>
            <span style={{color:"#666"}}>{v}</span>
          </div>
        ))}
      </Card>
      <Modal open={confirm} onClose={()=>setConfirm(false)} title="Reset All Data?">
        <p style={{fontSize:13,color:"#888",lineHeight:1.6,marginBottom:16}}>This will reset ALL data to defaults. This cannot be undone. Export a backup first.</p>
        <div style={{display:"flex",gap:10}}>
          <Btn v="danger" onClick={resetAll}>Yes, Reset Everything</Btn>
          <Btn v="ghost" onClick={()=>setConfirm(false)}>Cancel</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ═══ ROOT APP ═══
const NAV=[
  {id:"dash",     icon:"◈",  label:"Dashboard",    short:"Home",   group:"main"},
  {id:"floor",    icon:"⬡",  label:"Floor Plan",   short:"Floor",  group:"main"},
  {id:"kitchen",  icon:"🍳", label:"Kitchen",      short:"Kitchen",group:"main"},
  {id:"res",      icon:"📅", label:"Reservations", short:"Res.",   group:"main"},
  {id:"menu",     icon:"◉",  label:"Menu",         short:"Menu",   group:"ops"},
  {id:"specials", icon:"⭐", label:"Specials",     short:"Special",group:"ops"},
  {id:"staff",    icon:"◎",  label:"Staff",        short:"Staff",  group:"ops"},
  {id:"inventory",icon:"📦", label:"Inventory",    short:"Stock",  group:"ops"},
  {id:"analytics",icon:"▦",  label:"Analytics",   short:"Stats",  group:"insights"},
  {id:"crm",      icon:"👤", label:"Guest CRM",    short:"CRM",    group:"insights"},
  {id:"notif",    icon:"🔔", label:"Alerts",       short:"Alerts", badge:true, group:"insights"},
  {id:"aria",     icon:"✦",  label:"ARIA AI",      short:"ARIA",   ai:true,    group:"ai"},
  {id:"settings", icon:"⚙",  label:"Settings",     short:"Setup",  group:"ai"},
];
const GROUPS=[["main","Operations"],["ops","Management"],["insights","Insights"],["ai","AI & Config"]];
const BNAV=NAV.filter(n=>["dash","floor","menu","notif","aria"].includes(n.id));

function App(){
  const mob=useMob();
  const clock=useClock();
  const[page,setPage]=useState("dash");
  const[sideOpen,setSideOpen]=useState(false);
  const[tables,setTables]=useLS("tables",D_TABLES);
  const[menu,setMenu]=useLS("menu",D_MENU);
  const[staff,setStaff]=useLS("staff",D_STAFF);
  const[reservations,setReservations]=useLS("res",D_RES);
  const[notifs,setNotifs]=useLS("notifs",D_NOTIFS);
  const[specials,setSpecials]=useLS("specials",D_SPECIALS);
  const[inv,setInv]=useLS("inv",D_INV);
  const[kitchen,setKitchen]=useState(D_KITCHEN);
  const unread=notifs.filter(n=>!n.read).length;
  const ctx={tables,menu,staff,inv,specials,notifs,kitchen};

  const PAGES={
    dash:      ()=><Dashboard tables={tables} menu={menu} notifs={notifs} inv={inv} kitchen={kitchen} specials={specials} setPage={setPage} clock={clock} setNotifs={setNotifs}/>,
    floor:     ()=><FloorPlan tables={tables} setTables={setTables} menu={menu}/>,
    kitchen:   ()=><Kitchen kitchen={kitchen} setKitchen={setKitchen}/>,
    res:       ()=><Reservations reservations={reservations} setReservations={setReservations} tables={tables}/>,
    menu:      ()=><MenuMgmt menu={menu} setMenu={setMenu}/>,
    specials:  ()=><Specials specials={specials} setSpecials={setSpecials}/>,
    staff:     ()=><StaffPage staff={staff} setStaff={setStaff}/>,
    inventory: ()=><Inventory inv={inv} setInv={setInv}/>,
    analytics: ()=><Analytics menu={menu} tables={tables} staff={staff}/>,
    crm:       ()=><GuestCRM reservations={reservations}/>,
    notif:     ()=><NotifPage notifs={notifs} setNotifs={setNotifs} setPage={setPage}/>,
    aria:      ()=><ARIAPage tables={tables} staff={staff} menu={menu} inv={inv} specials={specials} notifs={notifs} kitchen={kitchen}/>,
    settings:  ()=><Settings tables={tables} menu={menu} staff={staff} reservations={reservations} notifs={notifs} specials={specials} inv={inv} setTables={setTables} setMenu={setMenu} setStaff={setStaff} setReservations={setReservations} setNotifs={setNotifs} setSpecials={setSpecials} setInv={setInv}/>,
  };
  const Page=PAGES[page]||PAGES.dash;

  function SideNav(){
    return(
      <>
        <div style={{padding:"0 16px 18px",borderBottom:"1px solid #161819",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:9,background:G+"20",display:"flex",alignItems:"center",justifyContent:"center",color:G,fontSize:15}}>&#10022;</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:G,letterSpacing:2}}>LUMIERE</div>
              <div style={{fontSize:8,color:"#333",letterSpacing:1.5,textTransform:"uppercase"}}>Management Suite</div>
            </div>
            {mob&&<button onClick={()=>setSideOpen(false)} style={{marginLeft:"auto",background:"none",border:"none",color:"#555",fontSize:20,cursor:"pointer",padding:"4px"}}>&#215;</button>}
          </div>
          <div style={{marginTop:10,fontSize:11,color:"#444",fontFamily:"monospace"}}>{clock.toLocaleTimeString("en-PK",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div>
        </div>
        <nav style={{flex:1,overflowY:"auto",padding:"0 8px"}}>
          {GROUPS.map(([grp,grpLbl])=>(
            <div key={grp} style={{marginBottom:6}}>
              <div style={{fontSize:9,color:"#2A2C30",letterSpacing:2,textTransform:"uppercase",padding:"6px 10px 4px"}}>{grpLbl}</div>
              {NAV.filter(n=>n.group===grp).map(n=>(
                <button key={n.id} onClick={()=>{setPage(n.id);setSideOpen(false);}}
                  style={{display:"flex",alignItems:"center",gap:9,padding:"9px 10px",background:page===n.id?G+"14":"none",border:"none",color:page===n.id?G:"#444",borderRadius:9,cursor:"pointer",fontSize:12,fontFamily:"inherit",textAlign:"left",width:"100%",transition:"all .15s",marginBottom:1}}
                  onMouseEnter={e=>{if(page!==n.id){e.currentTarget.style.background="#161819";e.currentTarget.style.color="#888";}}}
                  onMouseLeave={e=>{if(page!==n.id){e.currentTarget.style.background="none";e.currentTarget.style.color="#444";}}}>
                  <span style={{fontSize:13,width:18,textAlign:"center",flexShrink:0}}>{n.icon}</span>
                  <span style={{flex:1}}>{n.label}</span>
                  {n.ai&&<span style={{background:G,color:"#0A0B0C",fontSize:8,padding:"2px 6px",borderRadius:3,fontWeight:700,letterSpacing:.5}}>AI</span>}
                  {n.badge&&unread>0&&<span style={{background:RD,color:"#fff",borderRadius:"50%",width:17,height:17,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>{unread}</span>}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div style={{padding:"12px 16px 0",borderTop:"1px solid #161819",display:"flex",alignItems:"center",gap:7,fontSize:10,color:"#333"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:GR,boxShadow:`0 0 6px ${GR}55`}}/>
          System Online &middot; v4.0
        </div>
      </>
    );
  }

  return(
    <div style={{display:"flex",height:"100vh",position:"relative"}}>
      {!mob&&(
        <aside id="sidebar" style={{width:210,minWidth:210,background:"#0D0E10",borderRight:"1px solid #161819",display:"flex",flexDirection:"column",padding:"18px 0",flexShrink:0}}>
          <SideNav/>
        </aside>
      )}
      {mob&&sideOpen&&(
        <>
          <div onClick={()=>setSideOpen(false)} style={{position:"fixed",inset:0,background:"#000000BB",zIndex:200,backdropFilter:"blur(2px)"}}/>
          <aside style={{position:"fixed",top:0,left:0,bottom:0,width:240,background:"#0D0E10",borderRight:"1px solid #161819",display:"flex",flexDirection:"column",padding:"18px 0",zIndex:201,animation:"slideIn .2s ease"}}>
            <SideNav/>
          </aside>
        </>
      )}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        {mob&&(
          <div id="topbar" style={{background:"#0D0E10",borderBottom:"1px solid #161819",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <button onClick={()=>setSideOpen(true)} style={{background:"none",border:"none",color:G,fontSize:20,cursor:"pointer",padding:"2px 6px"}}>&#9776;</button>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:G,letterSpacing:3}}>LUMIERE</div>
            <div style={{display:"flex",gap:9,alignItems:"center"}}>
              {unread>0&&<button onClick={()=>setPage("notif")} style={{background:RD,border:"none",color:"#fff",borderRadius:"50%",width:22,height:22,fontSize:10,fontWeight:700,cursor:"pointer"}}>{unread}</button>}
              <span style={{width:6,height:6,borderRadius:"50%",background:GR,boxShadow:`0 0 5px ${GR}66`}}/>
            </div>
          </div>
        )}
        <main style={{flex:1,overflow:"hidden",background:"#0A0B0C"}} key={page} className="penter">
          <Page/>
        </main>
        {mob&&(
          <nav id="bottomnav" style={{background:"#0D0E10",borderTop:"1px solid #161819",display:"flex",padding:"5px 0",flexShrink:0}}>
            {BNAV.map(n=>(
              <button key={n.id} onClick={()=>setPage(n.id)}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",color:page===n.id?G:"#444",cursor:"pointer",padding:"5px 2px",position:"relative",transition:"color .2s"}}>
                <span style={{fontSize:16}}>{n.icon}</span>
                <span style={{fontSize:9}}>{n.short}</span>
                {page===n.id&&<span style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,borderRadius:1,background:G}}/>}
                {n.badge&&unread>0&&<span style={{position:"absolute",top:1,right:"12%",background:RD,color:"#fff",borderRadius:"50%",width:13,height:13,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700}}>{unread}</span>}
              </button>
            ))}
          </nav>
        )}
      </div>
    </div>
  );
}

const rootEl=document.getElementById("root");
const reactRoot=ReactDOM.createRoot(rootEl);
reactRoot.render(React.createElement(App));
document.getElementById("loading").style.display="none";
</script>
</body>
</html>
